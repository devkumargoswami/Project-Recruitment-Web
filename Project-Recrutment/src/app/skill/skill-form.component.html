<div class="form-container">
  <h2>Add User</h2>

  <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="id">ID</label>
      <input type="number" id="id" formControlName="id" placeholder="Enter ID">
    </div>

    <div class="form-group">
      <label for="userId">User ID</label>
      <input type="number" id="userId" formControlName="userId" placeholder="Enter User ID">
    </div>

    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" formControlName="name" placeholder="Enter Name">
    </div>

    <button type="submit" [disabled]="userForm.invalid || submitting">
      {{ submitting ? 'Submitting...' : 'Add User' }}
    </button>
  </form>
</div>
