<div class="container py-4">
  <div class="form-card">
    <div class="form-header">
      <div class="d-flex align-items-center gap-2">
        <i class="bi bi-calendar2-check-fill"></i>
        <h5 class="mb-0">{{ isEditMode ? 'Edit Interview' : 'Schedule Interview' }}</h5>
      </div>
    </div>

    <div class="form-body">
      <div class="row g-3">

        <!-- Interview Title -->
        <div class="col-md-6">
          <label class="form-label">Interview Title <span class="text-danger">*</span></label>
          <input type="text"
                 class="form-control custom-input"
                 title="Interview Title"
                 [(ngModel)]="schedule.interviewTitle"
                 placeholder="e.g. Angular Developer Interview" />
        </div>

        <!-- Interview By -->
        <div class="col-md-6">
          <label class="form-label">Interview By <span class="text-danger">*</span></label>
          <input type="text"
                 class="form-control custom-input"
                 title="Interview By"
                 [(ngModel)]="schedule.interviewBy"
                 placeholder="e.g. HR / Technical Panel" />
        </div>

        <!-- Date & Time -->
        <div class="col-md-6">
          <label class="form-label">Date & Time <span class="text-danger">*</span></label>
          <input type="datetime-local"
                 class="form-control custom-input"
                 title="Interview Date and Time"
                 [(ngModel)]="schedule.interviewDateTime" />
        </div>

        <!-- Status -->
        <div class="col-md-6">
          <label class="form-label">Status</label>
          <select class="form-select custom-input"
                  title="Status"
                  [(ngModel)]="schedule.status">
            <option *ngFor="let s of statusOptions" [value]="s.value">{{ s.label }}</option>
          </select>
        </div>

        <!-- Comments -->
        <div class="col-md-6">
          <label class="form-label">Comments</label>
          <textarea class="form-control custom-input"
                    rows="2"
                    title="Comments"
                    [(ngModel)]="schedule.comments"
                    placeholder="Any notes..."></textarea>
        </div>

        <!-- Recording Path -->
        <div class="col-md-6">
          <label class="form-label">Recording Path</label>
          <input type="text"
                 class="form-control custom-input"
                 title="Recording Path"
                 [(ngModel)]="schedule.recordingPath"
                 placeholder="e.g. /recordings/interview1.mp4" />
        </div>

      </div>

      <!-- Buttons -->
      <div class="d-flex gap-2 mt-4">
        <button class="btn btn-primary px-4" (click)="onSubmit()">
          <i class="bi" [ngClass]="isEditMode ? 'bi-pencil-fill' : 'bi-plus-lg'"></i>
          {{ isEditMode ? 'Update' : 'Schedule' }}
        </button>
        <button class="btn btn-outline-secondary px-4"
                (click)="reset()"
                *ngIf="isEditMode">
          <i class="bi bi-x-lg"></i> Cancel
        </button>
      </div>

    </div>
  </div>
</div>
